// =============================================
const playSound = (type) => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = ctx.createOscillator();
    const gainNode = ctx.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(ctx.destination);

    if (type === "success") {
      oscillator.frequency.setValueAtTime(523, ctx.currentTime);
      oscillator.frequency.setValueAtTime(784, ctx.currentTime + 0.15);
      gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      oscillator.start(ctx.currentTime);
      oscillator.stop(ctx.currentTime + 0.5);
    } else if (type === "fail") {
      oscillator.frequency.setValueAtTime(300, ctx.currentTime);
      oscillator.frequency.setValueAtTime(200, ctx.currentTime + 0.2);
      oscillator.type = "sawtooth";
      gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      oscillator.start(ctx.currentTime);
      oscillator.stop(ctx.currentTime + 0.4);
    } else if (type === "whistle") {
      oscillator.frequency.setValueAtTime(1200, ctx.currentTime);
      oscillator.frequency.setValueAtTime(900, ctx.currentTime + 0.1);
      oscillator.frequency.setValueAtTime(1200, ctx.currentTime + 0.2);
      gainNode.gain.setValueAtTime(0.15, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
      oscillator.start(ctx.currentTime);
      oscillator.stop(ctx.currentTime + 0.6);
    } else if (type === "goal") {
      const times = [0, 0.1, 0.2, 0.3, 0.4];
      const freqs = [523, 659, 784, 880, 1047];
      times.forEach((t, i) => {
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.frequency.setValueAtTime(freqs[i], ctx.currentTime + t);
        gain2.gain.setValueAtTime(0.2, ctx.currentTime + t);
        gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.15);
        osc2.start(ctx.currentTime + t);
        osc2.stop(ctx.currentTime + t + 0.15);
      });
    }
  } catch (e) {
    // 사운드 재생 실패 시 무시
  }
};

// =============================================
// 🎮 게임 리듀서
// =============================================
const initialState = {
  playerName: "",
  playerPosition: null,
  time: 0,
  score: { player: 0, opponent: 0 },
  cards: { yellow: 0, red: 0 },
  understandingScore: 0,
  currentEvent: null,
  eventCount: 0,
  gamePhase: "intro", // intro, game, result, ending
  lastResult: null,
  eventHistory: [],
  showGoalAnimation: false,
  usedEventIds: [],
  nameInput: "",
};

function gameReducer(state, action) {
  switch (action.type) {
    case "SET_NAME_INPUT":
      return { ...state, nameInput: action.payload };

    case "SET_POSITION":
      return { ...state, playerPosition: action.payload };

    case "START_GAME":
      return {
        ...state,
        playerName: state.nameInput,
        gamePhase: "game",
        currentEvent: action.payload,
        usedEventIds: [action.payload.id],
        eventCount: 1,
      };

    case "CHOOSE_ANSWER": {
      const choice = action.payload;
      const newCards = { ...state.cards };
      if (choice.card === "yellow") newCards.yellow += 1;
      if (choice.card === "red") newCards.red += 1;

      const newScore = { ...state.score };
      if (choice.isGoal) newScore.player += 1;

      // 랜덤 상대 득점 (틀린 경우 30% 확률)
      if (!choice.correct && Math.random() < 0.3) {
        newScore.opponent += 1;
      }

      const newUnderstanding = Math.max(
        0,
        Math.min(100, state.understandingScore + choice.points)
      );

      const historyEntry = {
        event: state.currentEvent.title,
        correct: choice.correct,
        rule: choice.rule,
      };

      return {
        ...state,
        cards: newCards,
        score: newScore,
        understandingScore: newUnderstanding,
        time: state.time + 10,
        lastResult: choice,
        eventHistory: [...state.eventHistory, historyEntry],
        showGoalAnimation: choice.isGoal,
        gamePhase: "result",
      };
    }

    case "NEXT_EVENT": {
      // 레드카드 or 이벤트 9개 이상이면 게임 종료
      if (state.cards.red >= 1 || state.eventCount >= 9) {
        return { ...state, gamePhase: "ending", showGoalAnimation: false };
      }

      // 미사용 이벤트 중 랜덤 선택
      const unused = EVENTS.filter((e) => !state.usedEventIds.includes(e.id));
      if (unused.length === 0) {
        return { ...state, gamePhase: "ending", showGoalAnimation: false };
      }
      const nextEvent = unused[Math.floor(Math.random() * unused.length)];

      return {
        ...state,
        currentEvent: nextEvent,
        usedEventIds: [...state.usedEventIds, nextEvent.id],
        eventCount: state.eventCount + 1,
        lastResult: null,
        gamePhase: "game",
        showGoalAnimation: false,
      };
    }

    case "HIDE_GOAL_ANIMATION":
      return { ...state, showGoalAnimation: false };

    case "RESTART":
      return { ...initialState };

    default:
      return state;
  }
}

// =============================================
// 🏆 엔딩 계산
// =============================================
function getEnding(state) {
  const { understandingScore, cards, score, eventHistory } = state;
  const foulCount = eventHistory.filter((e) => !e.correct).length;

  if (cards.red >= 1 || (cards.yellow >= 2 && foulCount >= 4)) {
    return {
      type: "chaos",
      title: "😈 반칙단 스카우트",

    };
  }

  if (understandingScore >= 50) {
    return {
      type: "growth",
      title: "👏 성장형 수호자",
      subtitle: "조금만 더!",

      bg: "from-blue-900 via-indigo-900 to-purple-900",
      textColor: "text-blue-100",
      accentColor: "text-blue-400",
      emoji: "👏",
      sound: "success",
      lesson: "💡 더 연습하면 룰 마스터가 될 수 있어요!",
    };
  }

  return {
    type: "tragedy",
    title: "💔 경기 붕괴",
    subtitle: "질서가 무너졌다...",
    description: `${state.playerName}... 반칙단의 혼란 앞에 규칙이 무너졌습니다. 다시 도전하세요!`,
    npc: "도윤",

    npcSpeech: "크크크, 이래서 규칙 공부를 해야 한다고.",

    lesson: "💡 규칙을 알아야 경기를 지킬 수 있습니다. 처음부터 다시!",
  };
}

    MF: "from-green-600 to-teal-500",
    DF: "from-blue-600 to-cyan-500",
    GK: "from-yellow-600 to-amber-500",

    if (!state.nameInput.trim() || !state.playerPosition) return;
    const firstEvent = EVENTS[Math.floor(Math.random() * EVENTS.length)];

    dispatch({ type: "START_GAME", payload: firstEvent });

    <div className="min-h-screen flex flex-col items-center justify-center relative overflow-hidden"

              height: Math.random() * 4 + 2 + "px",

              left: Math.random() * 100 + "%",
              top: Math.random() * 100 + "%",

              animationDelay: Math.random() * 4 + "s",
            }}
          />
        ))}
      </div>

      {/* 축구장 라인 장식 */}
      <div className="absolute inset-0 pointer-events-none opacity-5">
        <div className="absolute top-1/2 left-0 right-0 h-px bg-green-400" />
        <div className="absolute top-1/2 left-1/2 w-32 h-32 border-2 border-green-400 rounded-full -translate-x-1/2 -translate-y-1/2" />
        <div className="absolute top-0 left-1/2 h-full w-px bg-green-400 -translate-x-1/2" />
      </div>

        {/* 타이틀 */}
        <div className="text-center mb-10">
          <div className="text-7xl mb-4 animate-bounce">⚽</div>
          <h1
            className="text-4xl font-black mb-2 tracking-wider"
            style={{
              fontFamily: "'Trebuchet MS', sans-serif",
              background: "linear-gradient(90deg, #22c55e, #86efac, #22c55e)",
              WebkitBackgroundClip: "text",
              WebkitTextFillColor: "transparent",
              textShadow: "none",
            }}
          >
            사커 나이츠
          </h1>

        </div>

        <div className="mb-6">
          <label className="block text-green-300 text-sm font-bold mb-2 tracking-wider">
            ⚔️ 수호자 이름

              border: "2px solid rgba(34,197,94,0.4)",

        {/* 포지션 선택 */}

              <button

        </p>
      </div>

      <style>{`
        @keyframes float {
          0%, 100% { transform: translateY(0px) rotate(0deg); }
          50% { transform: translateY(-20px) rotate(180deg); }
        }
      `}</style>
    </div>
  );
}

      <div className="flex items-center gap-3">
        <span className="text-white font-black text-xl">{state.score.player}</span>
        <span className="text-gray-400 text-sm">VS</span>
        <span className="text-red-400 font-black text-xl">{state.score.opponent}</span>
      </div>

      {/* 이해도 + 카드 */}
      <div className="flex items-center gap-3">
        {/* 이해도 바 */}
        <div className="flex flex-col items-end">
          <span className="text-xs text-gray-400 mb-1">이해도</span>
          <div className="w-20 h-2 bg-gray-700 rounded-full overflow-hidden">
            <div
              className="h-full rounded-full transition-all duration-500"
              style={{
                width: `${state.understandingScore}%`,
                background: `linear-gradient(90deg, #dc2626, #eab308, #22c55e)`,
              }}
            />
          </div>
        </div>

        {/* 카드 */}
        <div className="flex gap-1">
          {state.cards.yellow > 0 && (
            <div className="flex items-center gap-1 bg-yellow-900 bg-opacity-60 px-2 py-1 rounded-lg">
              <div className="w-3 h-4 bg-yellow-400 rounded-sm" />
              <span className="text-yellow-300 text-xs font-bold">{state.cards.yellow}</span>
            </div>
          )}
          {state.cards.red > 0 && (
            <div className="flex items-center gap-1 bg-red-900 bg-opacity-60 px-2 py-1 rounded-lg">
              <div className="w-3 h-4 bg-red-500 rounded-sm" />
              <span className="text-red-300 text-xs font-bold">{state.cards.red}</span>
            </div>
          )}
        </div>

        <span className="text-gray-400 text-xs">
          {state.eventCount}/9
        </span>
      </div>
    </div>
  );
}

// =============================================
// 🎨 컴포넌트: 오프사이드 시각화
// =============================================
function OffsideVisual({ playerName }) {
  return (
    <div
      className="relative w-full rounded-xl overflow-hidden mb-4"
      style={{
        height: "120px",
        background: "linear-gradient(180deg, #14532d 0%, #166534 50%, #14532d 100%)",
        border: "2px solid rgba(34,197,94,0.3)",
      }}
    >
      {/* 필드 라인 */}
      <div className="absolute inset-0">
        <div className="absolute top-0 bottom-0 left-1/2 w-px bg-white opacity-30" />
        <div className="absolute left-1/2 top-1/2 w-8 h-8 border border-white opacity-20 rounded-full -translate-x-1/2 -translate-y-1/2" />
      </div>

      {/* 수비 라인 (빨간 점선) */}
      <div
        className="absolute top-0 bottom-0"
        style={{
          left: "60%",
          borderLeft: "3px dashed #ef4444",
          boxShadow: "0 0 10px rgba(239,68,68,0.5)",
        }}
      />
      <span
        className="absolute text-xs font-bold text-red-400"
        style={{ left: "62%", top: "4px" }}
      >
        수비라인
      </span>

      {/* 수비수들 */}
      <div
        className="absolute flex flex-col gap-1"
        style={{ left: "65%", top: "20%", transform: "translateY(-50%)" }}
      >
        {["🔵", "🔵"].map((d, i) => (
          <span key={i} className="text-xl" style={{ marginTop: i * 30 + "px" }}>
            {d}
          </span>
        ))}
      </div>

      {/* 공격수 (오프사이드 위치) */}
      <div className="absolute" style={{ left: "72%", top: "40%" }}>
        <div className="relative">
          <span className="text-xl">🔴</span>
          <div
            className="absolute -top-5 left-1/2 -translate-x-1/2 text-xs font-black text-yellow-300 whitespace-nowrap"
            style={{ animation: "blink 1s infinite" }}
          >
            위험!
          </div>
        </div>
      </div>

      {/* 공 */}
      <div className="absolute" style={{ left: "40%", top: "45%" }}>
        <span className="text-lg">⚽</span>
      </div>

      {/* 골대 */}
      <div
        className="absolute top-0 bottom-0 right-0 w-4"
        style={{ background: "rgba(255,255,255,0.1)", borderLeft: "2px solid white" }}
      />

      <div
        className="absolute bottom-2 left-2 text-xs text-green-300 font-bold opacity-70"
      >
        오프사이드 판독 시스템
      </div>

      <style>{`
        @keyframes blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0; }
        }
      `}</style>
    </div>
  );
}

// =============================================
// 🎨 컴포넌트: 게임 화면 (이벤트)
// =============================================
function GameScreen({ state, dispatch }) {
  const event = state.currentEvent;
  const [choosing, setChoosing] = useState(false);

  const handleChoice = (choice) => {
    if (choosing) return;
    setChoosing(true);

    // 사운드
    if (choice.isFoul) {
      playSound("whistle");
    } else if (choice.correct) {
      playSound("success");
    } else {
      playSound("fail");
    }

    if (choice.isGoal) {
      setTimeout(() => playSound("goal"), 100);
    }

    dispatch({ type: "CHOOSE_ANSWER", payload: choice });
    setChoosing(false);
  };

  if (!event) return null;

  return (
    <div className="flex flex-col min-h-screen" style={{ background: "#080f08" }}>
      <GameHUD state={state} />

      <div className="flex-1 overflow-y-auto px-4 py-4 space-y-4">
        {/* 이벤트 헤더 */}
        <div
          className="rounded-2xl p-4 text-center"
          style={{
            background: "linear-gradient(135deg, rgba(34,197,94,0.1), rgba(16,185,129,0.1))",
            border: "1px solid rgba(34,197,94,0.2)",
          }}
        >
          <div className="text-xs text-green-400 font-bold tracking-widest mb-1">
            ⏱ {event.time} | 이벤트 {state.eventCount}/9
          </div>
          <h2 className="text-white font-black text-2xl">{event.title}</h2>
        </div>

        {/* 오프사이드 시각화 */}
        {event.hasOffsideLine && <OffsideVisual playerName={state.playerName} />}

        {/* 상황 설명 */}
        <div
          className="rounded-2xl p-4"
          style={{
            background: "rgba(255,255,255,0.04)",
            border: "1px solid rgba(255,255,255,0.08)",
          }}
        >
          <p className="text-gray-200 text-sm leading-relaxed">{event.situation}</p>
        </div>

        {/* NPC 대사 */}
        <div
          className="rounded-2xl p-4 flex gap-3 items-start"
          style={{
            background:
              event.npc === "도윤"
                ? "rgba(220,38,38,0.1)"
                : "rgba(34,197,94,0.1)",
            border:
              event.npc === "도윤"
                ? "1px solid rgba(220,38,38,0.2)"
                : "1px solid rgba(34,197,94,0.2)",
          }}
        >
          <span className="text-3xl">{event.npcAvatar}</span>
          <div>
            <div
              className="text-xs font-black mb-1 tracking-wider"
              style={{ color: event.npc === "도윤" ? "#f87171" : "#86efac" }}
            >
              {event.npc} {event.npc === "도윤" ? "| 반칙단" : "| 팀 동료"}
            </div>
            <p className="text-white text-sm font-medium">
              "{state.playerName}! {event.npcSpeech}"
            </p>
          </div>
        </div>

        {/* 선택지 */}
        <div className="space-y-3">
          <div className="text-xs text-gray-500 font-bold tracking-wider text-center">
            ─── 어떻게 판단하겠습니까? ───
          </div>
          {event.choices.map((choice, idx) => (
            <button
              key={idx}
              onClick={() => handleChoice(choice)}
              disabled={choosing}
              className="w-full text-left rounded-2xl p-4 transition-all duration-200 active:scale-98"
              style={{
                background: "rgba(255,255,255,0.05)",
                border: "1px solid rgba(255,255,255,0.1)",
              }}
              onMouseEnter={(e) => {
                e.currentTarget.style.background = "rgba(34,197,94,0.15)";
                e.currentTarget.style.border = "1px solid rgba(34,197,94,0.4)";
                e.currentTarget.style.transform = "translateY(-1px)";
              }}
              onMouseLeave={(e) => {
                e.currentTarget.style.background = "rgba(255,255,255,0.05)";
                e.currentTarget.style.border = "1px solid rgba(255,255,255,0.1)";
                e.currentTarget.style.transform = "translateY(0)";
              }}
            >
              <span className="text-white font-medium text-sm">{choice.text}</span>
            </button>
          ))}
        </div>

        {/* 해설 힌트 */}
        <div
          className="rounded-xl p-3 flex items-start gap-2"
          style={{ background: "rgba(234,179,8,0.08)", border: "1px solid rgba(234,179,8,0.2)" }}
        >
          <span className="text-yellow-400 text-sm">💡</span>
          <p className="text-yellow-300 text-xs leading-relaxed">{event.commentary}</p>
        </div>
      </div>
    </div>
  );
}

// =============================================
// 🎨 컴포넌트: 결과 화면
// =============================================
function ResultScreen({ state, dispatch }) {
  const result = state.lastResult;
  const isCorrect = result?.correct;
  const isGoal = result?.isGoal;

  return (
    <div className="flex flex-col min-h-screen" style={{ background: "#080f08" }}>
      <GameHUD state={state} />

      {/* 골 애니메이션 */}
      {isGoal && (
        <div
          className="fixed inset-0 flex items-center justify-center z-50 pointer-events-none"
          style={{
            background: "rgba(0,0,0,0.7)",
            animation: "fadeOut 0.5s ease 2.5s forwards",
          }}
        >
          <div
            className="text-center"
            style={{ animation: "goalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)" }}
          >
            <div className="text-8xl font-black text-yellow-400 drop-shadow-2xl">GOAL!!!</div>
            <div className="text-4xl mt-2">⚽🎉🔥</div>
          </div>
        </div>
      )}

      <div className="flex-1 overflow-y-auto px-4 py-6 space-y-4">
        {/* 결과 카드 */}
        <div
          className="rounded-2xl p-5 text-center"
          style={{
            background: isCorrect
              ? "linear-gradient(135deg, rgba(34,197,94,0.2), rgba(16,185,129,0.1))"
              : "linear-gradient(135deg, rgba(220,38,38,0.2), rgba(239,68,68,0.1))",
            border: isCorrect
              ? "2px solid rgba(34,197,94,0.4)"
              : "2px solid rgba(220,38,38,0.4)",
            animation: isCorrect ? "successPulse 0.5s ease" : "failShake 0.5s ease",
          }}
        >
          <div className="text-4xl mb-3">{isCorrect ? "🔥" : "❌"}</div>
          <p
            className="font-black text-lg"
            style={{ color: isCorrect ? "#86efac" : "#fca5a5" }}
          >
            {result?.result}
          </p>
        </div>

        {/* 규칙 설명 */}
        <div
          className="rounded-2xl p-4"
          style={{
            background: "rgba(59,130,246,0.1)",
            border: "1px solid rgba(59,130,246,0.3)",
          }}
        >
          <div className="text-blue-400 text-xs font-black mb-2 tracking-wider">
            📚 규칙 설명
          </div>
          <p className="text-blue-100 text-sm leading-relaxed">{result?.rule}</p>
        </div>

        {/* 현재 상태 */}
        <div
          className="rounded-2xl p-4 grid grid-cols-3 gap-3"
          style={{
            background: "rgba(255,255,255,0.04)",
            border: "1px solid rgba(255,255,255,0.08)",
          }}
        >
          <div className="text-center">
            <div className="text-2xl font-black text-green-400">
              {state.understandingScore}
            </div>
            <div className="text-xs text-gray-400">이해도</div>
          </div>
          <div className="text-center">
            <div className="text-2xl font-black text-white">
              {state.score.player}:{state.score.opponent}
            </div>
            <div className="text-xs text-gray-400">스코어</div>
          </div>
          <div className="text-center">
            <div className="text-2xl font-black text-yellow-400">
              {state.eventCount}/9
            </div>
            <div className="text-xs text-gray-400">이벤트</div>
          </div>
        </div>

        {/* 다음 버튼 */}
        <button
          onClick={() => dispatch({ type: "NEXT_EVENT" })}
          className="w-full py-4 rounded-2xl font-black text-lg text-white transition-all duration-200"
          style={{
            background: "linear-gradient(135deg, #16a34a, #22c55e)",
            boxShadow: "0 0 20px rgba(34,197,94,0.3)",
          }}
        >
          {state.eventCount >= 9 || state.cards.red >= 1
            ? "📊 최종 결과 보기"
            : "⚽ 다음 상황으로 →"}
        </button>
      </div>

      <style>{`
        @keyframes successPulse {
          0% { transform: scale(0.95); opacity: 0; }
          60% { transform: scale(1.02); }
          100% { transform: scale(1); opacity: 1; }
        }
        @keyframes failShake {
          0%, 100% { transform: translateX(0); }
          20% { transform: translateX(-8px); }
          40% { transform: translateX(8px); }
          60% { transform: translateX(-4px); }
          80% { transform: translateX(4px); }
        }
        @keyframes goalPop {
          0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
          70% { transform: scale(1.1) rotate(2deg); }
          100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes fadeOut {
          to { opacity: 0; pointer-events: none; }
        }
      `}</style>
    </div>
  );
}

// =============================================
// 🎨 컴포넌트: 엔딩 화면
// =============================================
function EndingScreen({ state, dispatch }) {
  const ending = getEnding(state);
  const correctCount = state.eventHistory.filter((e) => e.correct).length;

  useEffect(() => {
    // 엔딩 사운드
    playSound(ending.sound);
    if (ending.type === "master") {
      setTimeout(() => playSound("success"), 600);
    }
  }, []);

  return (
    <div
      className={`min-h-screen flex flex-col relative overflow-hidden bg-gradient-to-b ${ending.bg}`}
    >
      {/* 배경 효과 */}
      {ending.type === "master" && (
        <div className="absolute inset-0 pointer-events-none">
          {[...Array(30)].map((_, i) => (
            <div
              key={i}
              className="absolute text-2xl"
              style={{
                left: Math.random() * 100 + "%",
                top: Math.random() * 100 + "%",
                animation: `confettiFall ${Math.random() * 3 + 2}s ease-in infinite`,
                animationDelay: Math.random() * 2 + "s",
              }}
            >
              {["⭐", "🌟", "✨", "🏆", "⚽"][Math.floor(Math.random() * 5)]}
            </div>
          ))}
        </div>
      )}

      {ending.type === "chaos" && (
        <div
          className="absolute inset-0 pointer-events-none opacity-20"
          style={{ background: "repeating-linear-gradient(45deg, #dc2626 0px, transparent 2px, transparent 20px, #dc2626 22px)" }}
        />
      )}

      <div className="relative z-10 flex-1 flex flex-col items-center justify-center px-6 py-8">
        {/* 엔딩 타입 배지 */}
        <div
          className="mb-6 px-4 py-2 rounded-full text-xs font-black tracking-widest"
          style={{
            background: "rgba(0,0,0,0.4)",
            border: "1px solid rgba(255,255,255,0.2)",
            color: "rgba(255,255,255,0.7)",
          }}
        >
          최종 결과
        </div>

        {/* 이모지 */}
        <div
          className="text-8xl mb-4"
          style={{ animation: "endingBounce 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)" }}
        >
          {ending.emoji}
        </div>

        {/* 제목 */}
        <h1 className={`text-4xl font-black text-center mb-2 ${ending.textColor}`}>
          {ending.title}
        </h1>
        <p className={`text-lg font-bold text-center mb-4 ${ending.accentColor}`}>
          {ending.subtitle}
        </p>

        {/* 설명 */}
        <p className={`text-center text-sm leading-relaxed mb-6 ${ending.textColor} opacity-80 max-w-sm`}>
          {ending.description}
        </p>

        {/* NPC 대사 */}
        <div
          className="w-full max-w-sm rounded-2xl p-4 mb-6 flex gap-3 items-start"
          style={{
            background: "rgba(0,0,0,0.3)",
            border: "1px solid rgba(255,255,255,0.15)",
          }}
        >
          <span className="text-3xl">{ending.npcAvatar}</span>
          <div>
            <div className={`text-xs font-black mb-1 ${ending.accentColor}`}>{ending.npc}</div>
            <p className={`text-sm ${ending.textColor}`}>"{ending.npcSpeech}"</p>
          </div>
        </div>

        {/* 통계 */}
        <div
          className="w-full max-w-sm rounded-2xl p-4 mb-4 grid grid-cols-3 gap-3"
          style={{ background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.1)" }}
        >
          <div className="text-center">
            <div className={`text-3xl font-black ${ending.accentColor}`}>
              {state.understandingScore}
            </div>
            <div className="text-xs text-gray-400">이해도</div>
          </div>
          <div className="text-center">
            <div className="text-3xl font-black text-white">
              {correctCount}/{state.eventHistory.length}
            </div>
            <div className="text-xs text-gray-400">정답률</div>
          </div>
          <div className="text-center">
            <div className="text-3xl font-black text-white">
              {state.score.player}:{state.score.opponent}
            </div>
            <div className="text-xs text-gray-400">최종 스코어</div>
          </div>
        </div>

        {/* 레슨 */}
        <div
          className="w-full max-w-sm rounded-xl p-3 mb-6 text-center"
          style={{ background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.1)" }}
        >
          <p className="text-yellow-300 text-sm font-bold">{ending.lesson}</p>
        </div>

        {/* 정답 기록 */}
        <div
          className="w-full max-w-sm rounded-2xl p-4 mb-6"
          style={{ background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.1)" }}
        >
          <div className="text-xs text-gray-400 font-bold mb-3 tracking-wider">📋 이벤트 기록</div>
          <div className="space-y-2 max-h-40 overflow-y-auto">
            {state.eventHistory.map((h, i) => (
              <div key={i} className="flex items-center gap-2 text-xs">
                <span>{h.correct ? "✅" : "❌"}</span>
                <span className="text-gray-300 flex-1 truncate">{h.event}</span>
              </div>
            ))}
          </div>
        </div>

        {/* 다시 하기 버튼 */}
        <button
          onClick={() => dispatch({ type: "RESTART" })}
          className="w-full max-w-sm py-4 rounded-2xl font-black text-lg text-white transition-all duration-200"
          style={{
            background: "linear-gradient(135deg, #16a34a, #22c55e)",
            boxShadow: "0 0 30px rgba(34,197,94,0.4)",
          }}
        >
          ⚽ 다시 도전하기
        </button>
      </div>

      <style>{`
        @keyframes endingBounce {
          0% { transform: scale(0) rotate(-20deg); opacity: 0; }
          60% { transform: scale(1.2) rotate(5deg); }
          80% { transform: scale(0.95) rotate(-2deg); }
          100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes confettiFall {
          0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
          100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
      `}</style>
    </div>
  );
}

// =============================================
// 🎮 메인 앱 (렌더링)
// =============================================
function App() {
  const [state, dispatch] = useReducer(gameReducer, initialState);

  return (
    <div
      className="min-h-screen max-w-md mx-auto relative"
      style={{
        fontFamily: "'Trebuchet MS', 'Malgun Gothic', sans-serif",
        color: "white",
      }}
    >
      {state.gamePhase === "intro" && (
        <IntroScreen state={state} dispatch={dispatch} />
      )}
      {state.gamePhase === "game" && (
        <GameScreen state={state} dispatch={dispatch} />
      )}
      {state.gamePhase === "result" && (
        <ResultScreen state={state} dispatch={dispatch} />
      )}
      {state.gamePhase === "ending" && (
        <EndingScreen state={state} dispatch={dispatch} />
      )}
    </div>
  );
}

// React 18 렌더링 초기화
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
